<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">Vedant Sawant initials avatar</title>
  <desc id="desc">A circular dark avatar with the initials VS.</desc>
  <defs>
    <radialGradient id="glow" cx="28%" cy="20%" r="78%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="42%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#07111f"/>
    </radialGradient>
    <linearGradient id="ring" x1="120" x2="680" y1="80" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="52%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="26" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="800" height="800" fill="#020617"/>
  <circle cx="400" cy="400" r="344" fill="url(#glow)" filter="url(#shadow)"/>
  <circle cx="400" cy="400" r="344" fill="none" stroke="url(#ring)" stroke-width="18"/>
  <circle cx="255" cy="190" r="132" fill="#ffffff" opacity="0.08"/>
  <circle cx="610" cy="580" r="190" fill="#14b8a6" opacity="0.13"/>
  <text x="400" y="462" text-anchor="middle"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="228" font-weight="800" letter-spacing="8" fill="#f8fafc">VS</text>
</svg>
